<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal | Hệ thống xác thực nội bộ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        nav {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
        }

        .container {
            max-width: 1100px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            padding: 0 20px;
            flex: 1;
        }

        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.9rem;
            color: var(--primary);
            text-transform: uppercase;
            border-bottom: 2px solid #eff6ff;
            padding-bottom: 8px;
        }

        .info-list { list-style: none; padding: 0; margin: 0; font-size: 0.85rem; line-height: 1.7; color: #475569; }

        /* KHU VỰC HIỂN THỊ FORM */
        .form-portal {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden; 
            width: 100%;
            height: 700px; /* Chiều cao cửa sổ */
            position: relative;
        }

        .form-portal iframe {
            width: 100% !important;
            height: 1000px !important; /* Chiều cao thực đẩy footer xuống */
            border: none;
            
            /* Dịch chuyển để che Header Google */
            /* Nếu vẫn không thấy gì, hãy đổi -140px thành 0 để kiểm tra */
            margin-top: -140px; 
        }

        @media (max-width: 800px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .form-portal { height: 850px; }
        }

        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #94a3b8; }
    </style>
</head>
<body>

<nav>
    <div class="brand">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        <span>STUDENT PORTAL</span>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="card">
            <h3>📢 QUY ĐỊNH</h3>
            <ul class="info-list">
                <li>• <b>Tài khoản:</b> Mã SV (Ví dụ: 12345)</li>
                <li>• <b>Mật khẩu:</b> Ngày sinh (dd/mm/yyyy)</li>
            </ul>
        </div>
    </aside>

    <main>
        <div class="form-portal">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSepUzi5vT-EcINqaOMKEUdGTLKM3M7Rembe-W6Pul0PW6CNYQ/viewform?embedded=true" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                Đang tải hệ thống...
            </iframe>
        </div>
    </main>
</div>

<footer>
    &copy; 2026 qlsv_trangnt - University Portal.
</footer>

</body>
</html>
