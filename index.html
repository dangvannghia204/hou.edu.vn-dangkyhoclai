<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đăng Ký Học Tập - Đào Tạo Từ Xa</title>
    <style>
        /* GIẢI PHÁP TỰ ĐỘNG ẨN THANH THÔNG BÁO GOOGLE (AUTOMATIC MASKING)
           Thay vì đóng thủ công, chúng ta đẩy iframe lên trên vùng nhìn thấy.
        */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #f8fafc;
        }

        #app-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden; /* Quan trọng: Ngăn banner lộ ra */
        }

        iframe {
            position: absolute;
            /* Đẩy iframe lên đúng 50px để che dòng "Ứng dụng này do..." */
            top: -50px; 
            left: 0;
            width: 100%;
            /* Bù lại 50px vào chiều cao để ứng dụng khớp đáy trình duyệt */
            height: calc(100% + 50px); 
            border: none;
            transition: opacity 0.5s ease;
        }

        /* Tối ưu hóa cho Mobile: Banner Google trên mobile thường cao hơn một chút */
        @media (max-width: 768px) {
            iframe {
                top: -55px;
                height: calc(100% + 55px);
            }
        }
    </style>
</head>
<body>

    <div id="app-wrapper">
        <!-- THAY LINK DƯỚI ĐÂY BẰNG LINK WEB APP CỦA BẠN (Dạng /exec) -->
        <iframe id="main-app" 
                src="https://script.google.com/macros/s/AKfycbwUKG7BFulmnagKfA9B_9rI00-klSqIl-yAdKHxeKHLMdJ9upw8R-69ay6DVnFEX6Vz/exec" 
                allow="clipboard-read; clipboard-write"
                title="Cổng đăng ký học tập">
        </iframe>
    </div>

</body>
</html>
